# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ec26664c8cac085b318bf9a46e237660"
name = "Premium Hero Section"
application_url = "https://premium-hero-section.vercel.app"
embedded = true

[access_scopes]
scopes = "write_products,write_metaobjects,write_metaobject_definitions"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "Example metaobject definition"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[auth]
redirect_urls = [
  "https://premium-hero-section.vercel.app/auth/callback",
  "https://premium-hero-section.vercel.app/auth/shopify/callback",
  "https://premium-hero-section.vercel.app/api/auth/callback"
]

[webhooks]
api_version = "2026-07"

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = false